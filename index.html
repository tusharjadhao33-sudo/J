<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tushar Spark ⚡</title>

<style>
body { font-family: Arial; background:#0f172a; margin:0; }

#chatBtn {
 position: fixed;
 bottom:20px; right:20px;
 background:#ff3b7a;
 color:white;
 border:none;
 padding:14px 18px;
 border-radius:50px;
 cursor:pointer;
 font-weight:bold;
}

#chatBox {
 position: fixed;
 bottom:80px; right:20px;
 width:340px;
 background:white;
 border-radius:15px;
 display:none;
 flex-direction:column;
 overflow:hidden;
 box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

#chatHeader {
 background:#ff3b7a;
 color:white;
 padding:12px;
 font-weight:bold;
}

#messages {
 height:280px;
 overflow-y:auto;
 padding:10px;
 font-size:14px;
}

.msg { margin:8px 0; }
.user { text-align:right; }
.bot { text-align:left; color:#ff3b7a; }

#inputArea {
 display:flex;
 border-top:1px solid #ddd;
}

#inputArea input {
 flex:1;
 padding:10px;
 border:none;
}

#inputArea button {
 background:#ff3b7a;
 color:white;
 border:none;
 padding:10px;
 cursor:pointer;
}
</style>
</head>

<body>

<button id="chatBtn">💬 Tushar Spark</button>

<div id="chatBox">
  <div id="chatHeader">Tushar Spark ⚡</div>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="userInput" placeholder="Ask anything..." />
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
  </div>
</div>

<script>
const chatBtn = document.getElementById("chatBtn");
const chatBox = document.getElementById("chatBox");
const messages = document.getElementById("messages");

chatBtn.onclick = () => {
  chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";
};

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* MEMORY */
let userName = localStorage.getItem("name") || "";

/* BASIC AI */
function getReply(input) {
  input = input.toLowerCase();

  // save name
  if (input.includes("my name is")) {
    userName = input.split("is")[1].trim();
    localStorage.setItem("name", userName);
    return "Nice to meet you " + userName + " 😊";
  }

  // greetings
  if (input.includes("hi") || input.includes("hello"))
    return "Hey " + (userName || "") + "! I'm Tushar Spark ⚡";

  // life advice
  if (input.includes("sad"))
    return "Tough times don't last 💪 stay strong.";

  if (input.includes("motivation"))
    return "Discipline beats motivation every time 🔥";

  // math (simple)
  try {
    if (/^[0-9+\-*/(). ]+$/.test(input)) {
      let result = eval(input);
      return "Answer: " + result;
    }
  } catch {}

  // coding help
  if (input.includes("html"))
    return "Basic HTML:\n<html>\n<body>Hello</body>\n</html>";

  if (input.includes("javascript"))
    return "Example JS:\nconsole.log('Hello World');";

  if (input.includes("css"))
    return "Example CSS:\nbody { background:black; }";

  // time
  if (input.includes("time"))
    return new Date().toLocaleTimeString();

  return "Hmm 🤔 I'm still learning... ask me something else!";
}

/* SEND */
function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  setTimeout(() => {
    addMessage(getReply(text), "bot");
  }, 400);

  input.value = "";
}

/* VOICE */
function startVoice() {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "en-IN";

  rec.onresult = function(e) {
    document.getElementById("userInput").value = e.results[0][0].transcript;
    sendMessage();
  };

  rec.start();
}
</script>

</body>
</html>
